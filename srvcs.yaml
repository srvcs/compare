schemaVersion: 1
name: "srvcs-compare"
slug: "compare"
repository: "srvcs/compare"
package: "srvcs-compare"
function: "comparison: -1, 0, or 1 ordering of a vs b"
kind: "orchestrator"
categories:
  - "comparison"
dependencies:
  - slug: "lessthan"
    service: "srvcs-lessthan"
  - slug: "greaterthan"
    service: "srvcs-greaterthan"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "a"
    type: "json"
    required: true
  - name: "b"
    type: "json"
    required: true
outputs:
  - name: "a"
    type: "json"
  - name: "b"
    type: "json"
  - name: "result"
    type: "integer"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_GREATERTHAN_URL"
    default: "http://127.0.0.1:8088"
    purpose: "Base URL for srvcs-greaterthan"
  - name: "SRVCS_LESSTHAN_URL"
    default: "http://127.0.0.1:8087"
    purpose: "Base URL for srvcs-lessthan"
